<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handled Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0e0f11;
color:white;
}

.header{
background:#16181c;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.logo{
font-size:24px;
font-weight:bold;
color:#f0c040;
}

.container{
padding:20px;
}

.login-box{
max-width:400px;
margin:100px auto;
background:#16181c;
padding:30px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
border:none;
color:white;
border-radius:8px;
}

button{
padding:12px 20px;
background:#f0c040;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.dashboard{
display:none;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#16181c;
padding:20px;
border-radius:12px;
}

.card h3{
margin:0;
color:#f0c040;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #333;
text-align:left;
}

th{
background:#222;
}
</style>
</head>
<body>

<div class="header">
<div class="logo">Handled Admin</div>
<button onclick="logout()">Logout</button>
</div>

<div id="loginPage" class="login-box">
<h2>Admin Login</h2>

<input type="password"
id="adminPass"
placeholder="Enter Admin Password">

<button onclick="login()">
Login
</button>
</div>

<div id="dashboard" class="container dashboard">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">
<h3>Total Jobs</h3>
<p id="jobs">0</p>
</div>

<div class="card">
<h3>Pending KYC</h3>
<p id="kyc">0</p>
</div>

<div class="card">
<h3>Workers</h3>
<p id="workers">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">P0</p>
</div>

</div>

<h2>KYC Reviews</h2>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>Sample Worker</td>
<td>worker@email.com</td>
<td>Pending</td>
<td>
<button>Approve</button>
<button>Reject</button>
</td>
</tr>

</table>

<h2>Job Requests</h2>

<table>

<tr>
<th>Service</th>
<th>Customer</th>
<th>Location</th>
<th>Price</th>
<th>Status</th>
</tr>

<tr>
<td>House Cleaning</td>
<td>Customer Name</td>
<td>Gaborone</td>
<td>P250</td>
<td>Open</td>
</tr>

</table>

</div>

<script>

const ADMIN_PASSWORD = "handled2025";

function login(){

const pass =
document.getElementById("adminPass").value;

if(pass === ADMIN_PASSWORD){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

}else{

alert("Wrong Password");

}

}

function logout(){

document.getElementById("dashboard")
.style.display = "none";

document.getElementById("loginPage")
.style.display = "block";

}

</script>

</body>
</html>
